name: Daily Publish — Articoli Programmati

on:
  schedule:
    # Ogni notte a mezzanotte (ora italiana = 23:00 UTC in estate, 22:00 in inverno)
    - cron: '0 22 * * *'
  workflow_dispatch: # permette anche esecuzione manuale da GitHub

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica articoli da pubblicare oggi
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Data oggi: $TODAY"

          # Cerca articoli con published: true e data <= oggi
          COUNT=$(grep -rl "published: true" content/blog/ | xargs grep -l "^date:" | while read f; do
            DATE=$(grep "^date:" "$f" | head -1 | sed 's/date: //' | tr -d ' ')
            if [[ ! "$DATE" > "$TODAY" ]]; then
              echo "$f"
            fi
          done | wc -l)

          echo "Articoli pubblicabili oggi: $COUNT"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Push per triggerare Vercel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "DaveGamba Bot"
          git config user.email "bot@davegamba.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git commit --allow-empty -m "chore: daily redeploy $(date +%Y-%m-%d) — pubblica articoli programmati"
          git push
