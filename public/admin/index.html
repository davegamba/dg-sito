<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaveGamba.com — CMS</title>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
<script>
CMS.init({
  config: {
    backend: {
      name: "github",
      repo: "davegamba/dg-sito",
      branch: "main",
      base_url: "https://dg-sito.vercel.app",
      auth_endpoint: "/api/decap-oauth/authorize",
    },
    media_folder: "public/images/blog",
    public_folder: "/images/blog",
    locale: "it",
    collections: [
      {
        name: "blog",
        label: "Articoli Blog",
        folder: "content/blog",
        create: true,
        slug: "{{slug}}",
        extension: "mdx",
        format: "frontmatter",
        fields: [
          { label: "Titolo", name: "title", widget: "string" },
          { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false },
          { label: "Categoria", name: "category", widget: "select", options: ["Allenamento", "Nutrizione", "Dimagrimento", "Testosterone", "Longevità", "Mindset", "Metodo BIM"], required: false },
          { label: "Excerpt (TL;DR)", name: "excerpt", widget: "text", hint: "Breve descrizione per SEO — max 155 caratteri" },
          { label: "Immagine copertina", name: "image", widget: "image", required: false },
          { label: "Pubblicato", name: "published", widget: "boolean", default: false, hint: "OFF = bozza invisibile sul sito. ON = visibile." },
          { label: "Contenuto", name: "body", widget: "markdown" },
        ],
      },
    ],
  },
});

// Preview template con contatore parole — Decap CMS v3 (function component)
var h = CMS.h;

function countWords(text) {
  if (!text) return 0;
  return text
    .replace(/<[^>]+>/g, ' ')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/\[.*?\]\(.*?\)/g, ' ')
    .replace(/[#*_`~>|]/g, ' ')
    .trim()
    .split(/\s+/)
    .filter(function(w) { return w.length > 0; })
    .length;
}

function getColor(count) {
  if (count < 1500) return '#e74c3c';
  if (count < 2500) return '#f39c12';
  if (count < 3500) return '#00CBDB';
  return '#27ae60';
}

function getLabel(count) {
  if (count < 1500) return 'Troppo corto';
  if (count < 2500) return 'Cluster ✓';
  if (count < 3500) return 'Pillar ✓';
  return 'Pillar lungo ✓';
}

function BlogPreview(props) {
    var entry = props.entry;
    var body = entry.getIn(['data', 'body']) || '';
    var title = entry.getIn(['data', 'title']) || '';
    var excerpt = entry.getIn(['data', 'excerpt']) || '';
    var category = entry.getIn(['data', 'category']) || '';
    var published = entry.getIn(['data', 'published']);
    var wordCount = countWords(body);
    var readingTime = Math.max(1, Math.round(wordCount / 200));
    var color = getColor(wordCount);
    var label = getLabel(wordCount);

    return h('div', { style: { fontFamily: 'system-ui, sans-serif', padding: '24px', background: '#fdf9f2', minHeight: '100vh' } },

      // Barra stato in cima
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px', flexWrap: 'wrap' } },

        // Contatore parole
        h('div', { style: { background: color, color: '#fff', borderRadius: '12px', padding: '8px 16px', fontWeight: '700', fontSize: '15px' } },
          '📝 ' + wordCount.toLocaleString('it-IT') + ' parole'
        ),

        // Tempo lettura
        h('div', { style: { background: '#1a1a1a', color: '#fff', borderRadius: '12px', padding: '8px 16px', fontSize: '14px' } },
          '⏱ ' + readingTime + ' min di lettura'
        ),

        // Label tipo articolo
        h('div', { style: { background: '#f0f0f0', color: '#333', borderRadius: '12px', padding: '8px 16px', fontSize: '13px' } },
          label
        ),

        // Stato pubblicazione
        h('div', { style: { background: published ? '#27ae60' : '#888', color: '#fff', borderRadius: '12px', padding: '8px 16px', fontSize: '13px' } },
          published ? '🟢 Pubblicato' : '⚫ Bozza'
        ),
      ),

      // Guida colori
      h('div', { style: { background: '#fff', border: '1px solid #e8e0d4', borderRadius: '12px', padding: '12px 16px', marginBottom: '24px', fontSize: '12px', color: '#888' } },
        h('span', { style: { marginRight: '16px' } }, '🔴 < 1.500 Troppo corto'),
        h('span', { style: { marginRight: '16px' } }, '🟠 1.500-2.500 Cluster'),
        h('span', { style: { marginRight: '16px' } }, '🔵 2.500-3.500 Pillar'),
        h('span', {}, '🟢 > 3.500 Pillar lungo'),
      ),

      // Titolo
      h('h1', { style: { fontFamily: 'Georgia, serif', fontSize: '28px', color: '#111', marginBottom: '8px', lineHeight: '1.2' } }, title),

      // Categoria
      category && h('span', { style: { display: 'inline-block', background: '#00CBDB', color: '#fff', fontSize: '11px', fontWeight: '700', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '4px 12px', borderRadius: '20px', marginBottom: '16px' } }, category),

      // Excerpt
      excerpt && h('p', { style: { color: '#666', fontStyle: 'italic', fontSize: '15px', marginBottom: '24px', borderLeft: '3px solid #00CBDB', paddingLeft: '12px' } }, excerpt),

      // Corpo
      h('div', { style: { color: '#222', lineHeight: '1.8', fontSize: '16px' } },
        props.widgetFor('body')
      )
    );
  }
});

CMS.registerPreviewTemplate('blog', BlogPreview);
CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap');
</script>
</body>
</html>
